## FIRST LINE/ROW: Info & Status
# First param в”Җв”Ң
[username]
format = " [в•ӯв”Җ$user]($style)@"
style_user = "bold red"
style_root = "bold red"
show_always = true

# Second param
[hostname]
format = "[$hostname]($style) in "
style = "bold dimmed red"
trim_at = "-"
ssh_only = false
disabled = false

# Third param
[directory]
style = "purple"
truncation_length = 0
truncate_to_repo = true
truncation_symbol = "repo: "

# Before all the version info (python, nodejs, php, etc.)
[git_status]
style = "white"
ahead = "вҮЎ${count}"
diverged = "вҮ•вҮЎ${ahead_count}вҮЈ${behind_count}"
behind = "вҮЈ${count}"
deleted = "x"

# Last param in the first line/row
[cmd_duration]
min_time = 1
format = "took [$duration]($style)"
disabled = false


## SECOND LINE/ROW: Prompt
# Somethere at the beginning
[battery]
full_symbol = "п•ё "
charging_symbol = "п–ғ "
discharging_symbol = "п–Ӯ "
disabled = true

[[battery.display]]  # "bold red" style when capacity is between 0% and 10%
threshold = 15
style = "bold red"
disabled = true

[[battery.display]]  # "bold yellow" style when capacity is between 10% and 30%
threshold = 50
style = "bold yellow"
disabled = true

[[battery.display]]  # "bold green" style when capacity is between 10% and 30%
threshold = 80
style = "bold green"
disabled = true

# Prompt: optional param 1
[time]
format = " рҹ•ҷ $time($style)\n"
time_format = "%T"
style = "bright-white"
disabled = true

# Prompt: param 2 в””в”Җ
[character]

## Code (1)
success_symbol = " [в•°в”ҖвқҜ](bold red)"
error_symbol = " [Г—](bold red)"

# Symbols which i can replace the arrow with ## Code (1)
# Success symbomls
# О»


